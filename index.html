<!DOCTYPE html>
<html>
<head>
    <style>
        body {
            width: 200px;
            padding: 15px;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            text-align: center;
        }
        .header {
            font-weight: bold;
            color: #ff0000;
            margin-bottom: 10px;
        }
        .instruction {
            font-size: 12px;
            color: #555;
            line-height: 1.4;
        }
        .status-box {
            margin-top: 10px;
            padding: 5px;
            background: #f0f0f0;
            border-radius: 4px;
            font-size: 11px;
        }
    </style>
</head>
<body>
    <div class="header">YT Playlist Scraper</div>
    <div class="instruction">
        Open a YouTube playlist and look for the <b>Red Export Button</b> on the page.
    </div>
    <div class="status-box">
        Scroll down to load more videos!
    </div>
</body>
</html>
